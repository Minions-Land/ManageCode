name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach assets to (e.g. v0.1.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip
        run: strip target/${{ matrix.target }}/release/minionscode

      - name: Package
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          STAGE="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/minionscode" "$STAGE/minionscode"
          ARCHIVE="minionscode-${TAG}-${{ matrix.asset }}.tar.gz"
          tar -C "$STAGE" -czf "$ARCHIVE" minionscode
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          fail_on_unmatched_files: true
