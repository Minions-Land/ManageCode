name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach assets to (e.g. v0.1.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset: macos-aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip
        run: strip target/${{ matrix.target }}/release/managecode

      - name: Package
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          STAGE="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/managecode" "$STAGE/managecode"
          ARCHIVE="managecode-${TAG}-${{ matrix.asset }}.tar.gz"
          tar -C "$STAGE" -czf "$ARCHIVE" managecode
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to release
        # Use the runner's built-in gh CLI instead of a JS action, so the
        # workflow has no Node-based dependencies.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          # Ensure a release exists for this tag (create on first upload, e.g.
          # for a manual workflow_dispatch run); ignore if it already exists.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" "$ARCHIVE" "$ARCHIVE.sha256" --clobber
