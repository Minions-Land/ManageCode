name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ManageCode version
      placeholder: "output of `managecode --version`, e.g. 1.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux x86_64
        - Other
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which agent(s) involved?
      multiple: true
      options:
        - Claude Code
        - Codex
        - Neither / N/A
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or screenshot
      render: shell
